server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: productos-service
          uri: lb://productos-service
          predicates:
            - Path=/productos/**
        - id: ordenes-service
          uri: lb://ordenes-service
          predicates:
            - Path=/ordenes/**
        - id: pagos-service
          uri: lb://pagos-service
          predicates:
            - Path=/pagos/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
